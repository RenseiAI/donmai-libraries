name: Publish to npm and GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.8.2). Required for manual dispatch.'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to npm and GitHub Packages
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      # Node 24 ships with npm 11.5.1+ which is REQUIRED for OIDC Trusted Publishers.
      # Node 20/22 ship with npm 10.x which has broken OIDC support.
      # See: https://github.com/npm/cli/issues/8730
      #
      # Also: do NOT set `registry-url` here. setup-node writes an `_authToken`
      # line to .npmrc which npm then prioritizes over the OIDC handshake,
      # causing 404 errors on publish. The default registry is registry.npmjs.org
      # so no configuration is needed.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Extract version from tag or workflow_dispatch input
      - name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "RELEASE_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          fi

      # Check if version already exists on npm
      - name: Check if version exists on npm
        id: check
        run: |
          if npm view @donmai/core@$RELEASE_VERSION version 2>/dev/null; then
            echo "Version $RELEASE_VERSION already exists on npm"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "Version $RELEASE_VERSION does not exist on npm, will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      # Update all package versions to match the tag
      - name: Set package versions
        if: steps.check.outputs.should_publish == 'true'
        run: |
          for pkg in packages/linear packages/architectural-intelligence packages/core packages/server packages/dashboard packages/mcp-server; do
            cd "$pkg"
            npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version
            cd "$GITHUB_WORKSPACE"
          done

      # Publish packages in dependency order to npm
      # KEEP+RENAME packages only — DEPRECATE packages (cli, code-intelligence,
      # nextjs, create-app) are deprecated on npm post-merge (coordinator action).
      # 1. @donmai/plugin-linear (no internal deps)
      # 2. @donmai/architectural-intelligence (no internal deps)
      # 3. @donmai/core (depends on plugin-linear, architectural-intelligence)
      # 4. @donmai/server (depends on core + plugin-linear)
      # 5. @donmai/dashboard (no internal runtime deps)
      # 6. @donmai/mcp-server (depends on server)
      - name: Publish @donmai/plugin-linear to npm
        if: steps.check.outputs.should_publish == 'true'
        run: .github/scripts/publish-if-needed.sh @donmai/plugin-linear "$RELEASE_VERSION" --provenance --access public

      - name: Publish @donmai/architectural-intelligence to npm
        if: steps.check.outputs.should_publish == 'true'
        run: .github/scripts/publish-if-needed.sh @donmai/architectural-intelligence "$RELEASE_VERSION" --provenance --access public

      - name: Publish @donmai/core to npm
        if: steps.check.outputs.should_publish == 'true'
        run: .github/scripts/publish-if-needed.sh @donmai/core "$RELEASE_VERSION" --provenance --access public

      - name: Publish @donmai/server to npm
        if: steps.check.outputs.should_publish == 'true'
        run: .github/scripts/publish-if-needed.sh @donmai/server "$RELEASE_VERSION" --provenance --access public

      - name: Publish @donmai/dashboard to npm
        if: steps.check.outputs.should_publish == 'true'
        run: .github/scripts/publish-if-needed.sh @donmai/dashboard "$RELEASE_VERSION" --provenance --access public

      - name: Publish @donmai/mcp-server to npm
        if: steps.check.outputs.should_publish == 'true'
        run: .github/scripts/publish-if-needed.sh @donmai/mcp-server "$RELEASE_VERSION" --provenance --access public

      # Publish to GitHub Packages
      - name: Setup Node.js for GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@donmai'

      - name: Remove deprecated always-auth from .npmrc
        if: steps.check.outputs.should_publish == 'true'
        run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - name: Publish @donmai/plugin-linear to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        continue-on-error: true
        run: .github/scripts/publish-if-needed.sh @donmai/plugin-linear "$RELEASE_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @donmai/architectural-intelligence to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        continue-on-error: true
        run: .github/scripts/publish-if-needed.sh @donmai/architectural-intelligence "$RELEASE_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @donmai/core to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        continue-on-error: true
        run: .github/scripts/publish-if-needed.sh @donmai/core "$RELEASE_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @donmai/server to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        continue-on-error: true
        run: .github/scripts/publish-if-needed.sh @donmai/server "$RELEASE_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @donmai/dashboard to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        continue-on-error: true
        run: .github/scripts/publish-if-needed.sh @donmai/dashboard "$RELEASE_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @donmai/mcp-server to GitHub Packages
        if: steps.check.outputs.should_publish == 'true'
        continue-on-error: true
        run: .github/scripts/publish-if-needed.sh @donmai/mcp-server "$RELEASE_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create GitHub Release
      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true'
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Generate and attach SBOMs to release
      - name: Install FOSSA CLI
        if: steps.check.outputs.should_publish == 'true' && env.FOSSA_API_KEY != ''
        run: |
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install-latest.sh | bash
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

      - name: Generate SBOMs and attribution
        if: steps.check.outputs.should_publish == 'true' && env.FOSSA_API_KEY != ''
        run: |
          fossa report attribution --format spdx --project donmai-libraries > sbom-spdx.json
          fossa report attribution --format cyclonedx --project donmai-libraries > sbom-cyclonedx.json
          fossa report attribution --project donmai-libraries > NOTICE
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}

      - name: Attach SBOMs to GitHub Release
        if: steps.check.outputs.should_publish == 'true' && env.FOSSA_API_KEY != ''
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            sbom-spdx.json \
            sbom-cyclonedx.json \
            NOTICE \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
